<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article - CR7 - The Last Dance</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>🐐</text></svg>">
</head>
<body>
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="logo">
                <span>🇵🇹</span> CR7<span class="logo-number">7</span> <span class="logo-text">The Last Dance</span>
            </a>
            <nav class="main-nav" id="mainNav">
                <a href="index.html">Home</a>
                <a href="news.html">News</a>
                <a href="live-scores.html">Live Scores</a>
                <a href="world-cup.html">World Cup 2026</a>
                <a href="stats.html">Stats</a>
                <a href="about.html">About</a>
            </nav>
            <div class="header-actions">
                <select class="lang-switch" onchange="changeLanguage(this.value)">
                    <option value="en">🇬🇧 EN</option>
                    <option value="ar">🇸🇦 AR</option>
                    <option value="fr">🇫🇷 FR</option>
                    <option value="pt">🇵🇹 PT</option>
                    <option value="es">🇪🇸 ES</option>
                </select>
                <button class="dark-toggle" id="darkToggle">🌙</button>
            </div>
        </div>
    </header>

    <main class="container" style="max-width:800px;margin:2rem auto;padding:0 1.5rem;">
        <article id="articleContent">
            <p style="text-align:center;padding:4rem;">Loading article...</p>
        </article>

        <div class="sharing-buttons">
            <button class="share-btn twitter" onclick="shareArticle('twitter')">𝕏 Tweet</button>
            <button class="share-btn facebook" onclick="shareArticle('facebook')">📘 Share</button>
            <button class="share-btn whatsapp" onclick="shareArticle('whatsapp')">💬 WhatsApp</button>
            <button class="share-btn telegram" onclick="shareArticle('telegram')">📨 Telegram</button>
        </div>

        <a href="news.html" style="display:inline-block;margin:1rem 0;color:var(--primary);">← Back to News</a>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">
            <p>© 2025 CR7 - The Last Dance. Made with ❤️ by Zer Salah</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const articleId = urlParams.get('id');
        
        async function loadArticle() {
            if (!articleId) {
                document.getElementById('articleContent').innerHTML = '<p>Article not found.</p>';
                return;
            }
            try {
                const response = await fetch('data/posts.json');
                const data = await response.json();
                const post = data.posts.find(p => p.id === articleId);
                if (!post) {
                    document.getElementById('articleContent').innerHTML = '<p>Article not found.</p>';
                    return;
                }
                document.title = post.title + ' - CR7 - The Last Dance';
                document.getElementById('articleContent').innerHTML = `
                    <h1 style="font-size:2rem;margin-bottom:0.5rem;">${post.title}</h1>
                    <div style="color:var(--text-light);margin-bottom:1.5rem;">
                        <span>📅 ${post.date}</span> • <span>⏱ ${post.readTime} min read</span> • <span>🏷 ${post.category}</span>
                    </div>
                    ${post.image ? `<img src="${post.image}" alt="${post.title}" style="width:100%;border-radius:12px;margin-bottom:1.5rem;">` : ''}
                    <div style="font-size:1.1rem;line-height:1.9;">${post.content || 'Full article coming soon...'}</div>
                `;
            } catch (error) {
                document.getElementById('articleContent').innerHTML = '<p>Error loading article.</p>';
            }
        }
        
        function shareArticle(platform) {
            const url = encodeURIComponent(window.location.href);
            const title = encodeURIComponent(document.title);
            const links = {
                twitter: `https://twitter.com/intent/tweet?url=${url}&text=${title}`,
                facebook: `https://www.facebook.com/sharer/sharer.php?u=${url}`,
                whatsapp: `https://wa.me/?text=${title}%20${url}`,
                telegram: `https://t.me/share/url?url=${url}&text=${title}`
            };
            window.open(links[platform], '_blank', 'width=600,height=400');
        }
        
        loadArticle();
    </script>
</body>
</html>
