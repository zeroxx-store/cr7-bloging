<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article – CR7 The Last Dance</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇵🇹</text></svg>">
</head>
<body>
  <div id="progress-bar"></div>
  <header class="site-header">
    <div class="header-top">
      <a href="index.html" class="logo"><span class="logo-flag">🇵🇹</span> CR7 <span class="logo-badge">7</span> The Last Dance</a>
      <div class="header-top-right">
        <select class="lang-select" id="langSelect"><option value="en">🇬🇧 EN</option><option value="ar">🇸🇦 AR</option><option value="fr">🇫🇷 FR</option><option value="pt">🇵🇹 PT</option><option value="es">🇪🇸 ES</option></select>
        <button class="icon-btn" id="darkBtn">🌙</button>
        <button class="icon-btn menu-btn" id="menuBtn">☰</button>
      </div>
    </div>
    <nav class="header-nav" id="mainNav">
      <a href="index.html">Home</a><a href="news.html" class="active">News</a><a href="live-scores.html">Live Scores</a><a href="world-cup.html">World Cup 2026</a><a href="stats.html">Stats</a><a href="about.html">About</a>
      <a href="live-scores.html" class="nav-live">🔴 LIVE</a>
    </nav>
  </header>

  <div class="article-hero" id="articleHero"></div>
  <div class="article-content-wrap">
    <a href="news.html" style="font-size:.83rem;color:var(--text-3);display:inline-flex;align-items:center;gap:.3rem;margin-bottom:1.2rem;">← Back to News</a>
    <h1 id="articleTitle" style="font-size:clamp(1.5rem,3vw,2.2rem);font-weight:900;line-height:1.2;margin-bottom:.75rem;"></h1>
    <div id="articleMeta" style="font-size:.82rem;color:var(--text-3);margin-bottom:2rem;display:flex;gap:.5rem;flex-wrap:wrap;"></div>
    <div class="article-content" id="articleContent"></div>
    <div class="share-row">
      <button class="share-btn x" data-share="x">𝕏 Share</button>
      <button class="share-btn fb" data-share="fb">Facebook</button>
      <button class="share-btn wa" data-share="wa">WhatsApp</button>
      <button class="share-btn tg" data-share="tg">Telegram</button>
      <button class="share-btn copy" data-share="copy">🔗 Copy Link</button>
    </div>
    <section>
      <h2 class="section-title" style="font-size:1.1rem;margin-bottom:1rem;">Related Articles</h2>
      <div class="posts-grid" id="relatedPosts"></div>
    </section>
  </div>

  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-bottom">© 2026 CR7 – The Last Dance. Made with ❤️ by Zer Salah.</div>
    </div>
  </footer>
  <div class="chatbot-window" id="chatWindow">
    <div class="chatbot-head">
      <div class="chatbot-avatar">CR7</div>
      <div class="chatbot-head-info"><h4>CR7Bot 🤖</h4><p>Ask me anything about Ronaldo</p></div>
      <button class="chatbot-close" id="chatClose">✕</button>
    </div>
    <div class="chatbot-msgs" id="chatMsgs"><div class="chat-msg bot">⚽ Olá! I'm CR7Bot. Ask me anything about Cristiano Ronaldo!</div></div>
    <div class="chatbot-footer">
      <input class="chat-input" id="chatInput" type="text" placeholder="Ask about CR7...">
      <button class="chat-send" id="chatSend">➤</button>
    </div>
  </div>
  <button class="chatbot-fab" id="chatFab">🐐</button>
  <script src="js/main.js"></script>
</body>
</html>
